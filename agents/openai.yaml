interface:
  display_name: "dvwa-automated-testing Web Lab Solver"
  short_description: "Guide authorized DVWA, web-lab, and simulated-real web assessment reports"
  default_prompt: "Use $dvwa-automated-testing for my authorized web lab. Follow the agent-led protocol: confirm scope and authorization, inspect the live target first, review source when available, build a route/form/API/request model, form hypotheses, choose tools based on evidence, generate task-specific tests only when needed, capture screenshots automatically with Playwright when available, and produce a readable Markdown report in my requested language with methodology, operation log, timing, evidence, screenshots, findings or difficulty progression, remediation, limitations, and reproduction details. Do not rely on fixed helper scripts as the primary workflow."
