interface:
  display_name: "dvwa-automated-testing Web Lab Solver"
  short_description: "Guide authorized DVWA/web-lab solving, progression, and Markdown reports"
  default_prompt: "Use $dvwa-automated-testing to solve my authorized DVWA/web-lab challenge. Follow the agent solving protocol: inspect the live page and matching source first, form hypotheses, choose tools, generate task-specific tests if needed, capture screenshots automatically with Playwright when available, progress from low to higher difficulties when no difficulty is specified, and produce a readable Markdown walkthrough report in my requested language with intermediate operations, screenshots or failed screenshot command/error notes, operation log, timing with start/finish/elapsed time, evidence, difficulty progression, no-solution analysis, and a section named `实验总报告可提取信息` with conclusion, per-difficulty causes, solving steps, tools and operations, core payloads/test inputs, key screenshots, reproduction summary, helper scripts, and manual verification focus."
